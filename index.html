<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-bubble { max-width: 80%; padding: 10px 16px; border-radius: 18px; margin: 4px 0; font-size: 15px; cursor: pointer; }
        .my-msg { background-color: #007AFF; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .other-msg { background-color: #E9E9EB; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">

    <header class="bg-white border-b p-4 text-center font-bold text-lg shadow-sm">
        Messenger <span id="user-display" class="text-xs text-blue-500 block"></span>
    </header>

    <div id="chat-window" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-1"></div>

    <form id="chat-form" class="bg-white p-4 border-t flex gap-3 items-center">
        <input id="msg-input" type="text" class="flex-1 bg-gray-100 rounded-full px-5 py-3 focus:outline-none" placeholder="Message..." required>
        <button type="submit" class="text-blue-500 font-bold px-2">Send</button>
    </form>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = { /* ... YOUR CONFIG ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let userId = localStorage.getItem('userId') || 'User-' + Math.floor(Math.random() * 900 + 100);
        localStorage.setItem('userId', userId);
        document.getElementById('user-display').textContent = `Logged in as: ${userId}`;

        let currentRecipient = null; // null = public chat

        const chatWindow = document.getElementById('chat-window');
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        
        onSnapshot(q, (snapshot) => {
            chatWindow.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const msg = docSnap.data();
                // Filter: Show if public, or if involved in private chat
                if (!msg.recipient || msg.recipient === userId || msg.sender === userId) {
                    const div = document.createElement('div');
                    div.className = `chat-bubble ${msg.sender === userId ? 'my-msg' : 'other-msg'}`;
                    div.innerHTML = `<small class="block text-[9px] opacity-60" onclick="setRecipient('${msg.sender}')">${msg.sender} ${msg.recipient ? '(Private)' : ''}</small>${msg.text}`;
                    chatWindow.appendChild(div);
                }
            });
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        // Global function to set private chat
        window.setRecipient = (id) => {
            if(id === userId) return;
            currentRecipient = id;
            alert(`Now chatting privately with ${id}`);
        };

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            const text = input.value.trim();

            if (text === "🚩clear🚩") {
                const querySnapshot = await getDocs(collection(db, "messages"));
                querySnapshot.forEach(d => deleteDoc(doc(db, "messages", d.id)));
            } else {
                await addDoc(collection(db, "messages"), {
                    text, sender: userId, recipient: currentRecipient, createdAt: serverTimestamp()
                });
            }
            input.value = "";
        };
    </script>
</body>
</html>

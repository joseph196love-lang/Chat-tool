<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; }
        .chat-window { position: fixed; bottom: 20px; right: 20px; width: 300px; height: 400px; background: #1c1c1e; border: 1px solid #333; border-radius: 15px; display: flex; flex-direction: column; z-index: 50; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        .bubble { padding: 10px 15px; border-radius: 18px; margin: 4px 10px; font-size: 15px; max-width: 75%; position: relative; }
        .my-msg { background: #007AFF; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .other-msg { background: #333335; color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="p-4 flex justify-between items-center border-b border-[#333]">
        <button onclick="toggleMenu()" class="text-xl">☰</button>
        <span class="font-bold">Messenger</span>
        <div id="private-tabs" class="flex gap-2"></div>
    </header>

    <div id="menu" class="hidden absolute left-0 top-16 bg-[#1c1c1e] p-4 w-48 shadow-lg z-40 border border-[#333]">
        <p class="font-bold border-b border-[#333] mb-2">Online</p>
        <div id="user-list"></div>
    </div>

    <div id="main-chat" class="flex-1 overflow-y-auto p-4 flex flex-col"></div>

    <div class="p-4 bg-black border-t border-[#333] flex gap-2">
        <input id="msg-input" class="flex-1 bg-[#1c1c1e] text-white rounded-full px-4 py-2 focus:outline-none" placeholder="Message...">
        <button id="send-btn" class="bg-blue-600 text-white px-6 py-2 rounded-full">Send</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDu23dacVvR0o87hzIeYS4Ii2xUE5YmHOo",
            authDomain: "chat-6baa5.firebaseapp.com",
            projectId: "chat-6baa5",
            storageBucket: "chat-6baa5.firebasestorage.app",
            messagingSenderId: "392445469960",
            appId: "1:392445469960:web:60b539ab8862a11722f8bd",
            measurementId: "G-48G4Y0BMZT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Random Username Assignment
        const adjectives = ["Happy", "Swift", "Cool", "Bold", "Wild"];
        const nouns = ["Tiger", "Eagle", "Shark", "Wolf", "Bear"];
        let username = localStorage.getItem('username');
        if (!username) {
            username = adjectives[Math.floor(Math.random()*adjectives.length)] + nouns[Math.floor(Math.random()*nouns.length)] + Math.floor(Math.random()*99);
            localStorage.setItem('username', username);
        }

        window.toggleMenu = () => document.getElementById('menu').classList.toggle('hidden');

        window.openPrivateChat = (recipient) => {
            if(document.getElementById(`win-${recipient}`)) return;
            const div = document.createElement('div');
            div.className = "chat-window";
            div.id = `win-${recipient}`;
            div.innerHTML = `
                <div class="p-3 bg-[#1c1c1e] text-white border-b border-[#333] flex justify-between rounded-t-lg">
                    <span class="font-bold">${recipient}</span> 
                    <button onclick="this.parentElement.parentElement.remove()" class="text-gray-400">✕</button>
                </div>
                <div class="flex-1 overflow-y-auto p-2" id="msgs-${recipient}"></div>
                <div class="p-2 border-t border-[#333] flex"><input id="in-${recipient}" class="flex-1 bg-black text-white px-2" placeholder="Msg..."><button onclick="sendPrivate('${recipient}')" class="text-blue-500 px-2">Send</button></div>
            `;
            document.body.appendChild(div);
        };

        window.sendPrivate = async (recipient) => {
            const input = document.getElementById(`in-${recipient}`);
            await addDoc(collection(db, "messages"), { text: input.value, sender: username, recipient: recipient, createdAt: serverTimestamp() });
            input.value = "";
        };

        document.getElementById('send-btn').onclick = async () => {
            const input = document.getElementById('msg-input');
            if (input.value === "!! Clear") {
                if (prompt("Enter Code:") === "7759265834") {
                    const docs = await getDocs(collection(db, "messages"));
                    docs.forEach(d => deleteDoc(doc(db, "messages", d.id)));
                }
            } else if (input.value.trim() !== "") {
                await addDoc(collection(db, "messages"), { text: input.value, sender: username, createdAt: serverTimestamp() });
            }
            input.value = "";
        };

        onSnapshot(query(collection(db, "messages"), orderBy("createdAt", "asc")), (snapshot) => {
            const mainChat = document.getElementById('main-chat');
            mainChat.innerHTML = "";
            snapshot.forEach((d) => {
                const msg = d.data();
                if(!msg.recipient) {
                    const div = document.createElement('div');
                    div.className = `bubble ${msg.sender === username ? 'my-msg' : 'other-msg'}`;
                    div.innerHTML = `<small class="block text-[9px] opacity-60 cursor-pointer" onclick="openPrivateChat('${msg.sender}')">${msg.sender}</small>${msg.text}`;
                    mainChat.appendChild(div);
                }
            });
        });
    </script>
</body>
</html>

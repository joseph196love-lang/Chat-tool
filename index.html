<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <header class="bg-indigo-600 text-white p-4 font-bold text-xl shadow-md">Live Chat</header>

    <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

    <form id="chat-form" class="bg-white p-4 border-t flex gap-2">
        <input id="msg-input" type="text" class="flex-1 border rounded-full px-4 py-2 focus:outline-none" placeholder="Message..." required>
        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-full">Send</button>
    </form>

    <script type="module">
        // Use CDN URLs that are confirmed to work
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        // ADD YOUR CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyDu23dacVvR0o87hzIeYS4Ii2xUE5YmHOo",
            authDomain: "chat-6baa5.firebaseapp.com",
            projectId: "chat-6baa5",
            storageBucket: "chat-6baa5.firebasestorage.app",
            messagingSenderId: "392445469960",
            appId: "1:392445469960:web:60b539ab8862a11722f8bd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'messages');

        const chatWindow = document.getElementById('chat-window');

        onChildAdded(chatRef, (snapshot) => {
            const msg = snapshot.val();
            const div = document.createElement('div');
            div.className = "bg-white p-3 rounded-lg shadow w-fit max-w-[80%]";
            div.textContent = msg.text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        document.getElementById('chat-form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            push(chatRef, { text: input.value });
            input.value = "";
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; margin: 0; font-family: sans-serif; }
        .chat-window { position: fixed; bottom: 0; right: 0; width: 100%; height: 90%; background: #1c1c1e; border-top-left-radius: 15px; border-top-right-radius: 15px; display: flex; flex-direction: column; z-index: 100; }
        @media (min-width: 768px) { .chat-window { width: 320px; height: 450px; right: 20px; bottom: 20px; border-radius: 15px; } }
        .bubble { padding: 10px 15px; border-radius: 18px; margin: 6px 10px; font-size: 15px; max-width: 75%; }
        .my-msg { background: #007AFF; align-self: flex-end; border-bottom-right-radius: 2px; }
        .other-msg { background: #333335; align-self: flex-start; border-bottom-left-radius: 2px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="p-4 flex justify-between items-center border-b border-[#333]">
        <button id="menu-btn" class="text-xl">☰</button>
        <span class="font-bold">Messenger</span>
        <div id="private-tabs">💬</div>
    </header>

    <div id="menu" class="hidden absolute left-0 top-16 bg-[#1c1c1e] p-4 w-48 shadow-lg z-40 border border-[#333]">
        <p class="font-bold border-b border-[#333] mb-2">Online Users</p>
        <div id="user-list"></div>
    </div>

    <div id="main-chat" class="flex-1 overflow-y-auto p-4 flex flex-col"></div>

    <div class="p-4 bg-black border-t border-[#333] flex gap-2">
        <input id="msg-input" class="flex-1 bg-[#1c1c1e] text-white rounded-full px-4 py-2 focus:outline-none" placeholder="Message...">
        <button id="send-btn" class="bg-blue-600 text-white px-6 py-2 rounded-full">Send</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDu23dacVvR0o87hzIeYS4Ii2xUE5YmHOo",
            authDomain: "chat-6baa5.firebaseapp.com",
            projectId: "chat-6baa5",
            storageBucket: "chat-6baa5.firebasestorage.app",
            messagingSenderId: "392445469960",
            appId: "1:392445469960:web:60b539ab8862a11722f8bd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let username = localStorage.getItem('username') || "User-" + Math.floor(Math.random()*999);
        localStorage.setItem('username', username);

        // 2. Buttons work now because they are standard functions
        document.getElementById('menu-btn').onclick = () => document.getElementById('menu').classList.toggle('hidden');
        
        document.getElementById('send-btn').onclick = () => {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            db.collection("messages").add({
                text: input.value,
                sender: username,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
        };

        // 3. Real-time listener
        db.collection("messages").orderBy("createdAt", "asc").onSnapshot(snapshot => {
            const mainChat = document.getElementById('main-chat');
            mainChat.innerHTML = "";
            snapshot.forEach(doc => {
                const msg = doc.data();
                if(!msg.recipient) {
                    const div = document.createElement('div');
                    div.className = `bubble ${msg.sender === username ? 'my-msg' : 'other-msg'}`;
                    div.innerHTML = `<small style="font-size:9px; opacity:0.6">${msg.sender}</small><br>${msg.text}`;
                    mainChat.appendChild(div);
                }
            });
        });
    </script>
</body>
</html>
